name: Deploy Worker

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check deployment secrets
        id: deployment-secrets
        shell: bash
        run: |
          missing=0

          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN MCP_OAUTH_CLIENT_ID MCP_OAUTH_CLIENT_SECRET MCP_ACCESS_TOKEN_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::notice::GitHub secret $name is not configured; skipping Worker deploy."
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$missing" -ne 0 ]; then
            echo "::notice::Validation completed, but Worker deploy is disabled until this repository has its own deployment secrets."
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MCP_OAUTH_CLIENT_ID: ${{ secrets.MCP_OAUTH_CLIENT_ID }}
          MCP_OAUTH_CLIENT_SECRET: ${{ secrets.MCP_OAUTH_CLIENT_SECRET }}
          MCP_ACCESS_TOKEN_SECRET: ${{ secrets.MCP_ACCESS_TOKEN_SECRET }}

      - name: Deploy Worker
        if: github.event_name != 'pull_request' && steps.deployment-secrets.outputs.configured == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Sync Worker OAuth secrets
        if: github.event_name != 'pull_request' && steps.deployment-secrets.outputs.configured == 'true'
        shell: bash
        run: |
          for name in MCP_OAUTH_CLIENT_ID MCP_OAUTH_CLIENT_SECRET MCP_ACCESS_TOKEN_SECRET; do
            printf "%s" "${!name}" | npx wrangler secret put "$name"
          done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MCP_OAUTH_CLIENT_ID: ${{ secrets.MCP_OAUTH_CLIENT_ID }}
          MCP_OAUTH_CLIENT_SECRET: ${{ secrets.MCP_OAUTH_CLIENT_SECRET }}
          MCP_ACCESS_TOKEN_SECRET: ${{ secrets.MCP_ACCESS_TOKEN_SECRET }}
