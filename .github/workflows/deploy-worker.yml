name: Deploy Worker

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check deployment secrets
        shell: bash
        run: |
          missing=0

          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN MCP_OAUTH_CLIENT_ID MCP_OAUTH_CLIENT_SECRET MCP_ACCESS_TOKEN_SECRET MCP_OAUTH_REDIRECT_URIS; do
            if [ -z "${!name}" ]; then
              echo "::error::GitHub secret $name is required for Worker deploy."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MCP_OAUTH_CLIENT_ID: ${{ secrets.MCP_OAUTH_CLIENT_ID }}
          MCP_OAUTH_CLIENT_SECRET: ${{ secrets.MCP_OAUTH_CLIENT_SECRET }}
          MCP_ACCESS_TOKEN_SECRET: ${{ secrets.MCP_ACCESS_TOKEN_SECRET }}
          MCP_OAUTH_REDIRECT_URIS: ${{ secrets.MCP_OAUTH_REDIRECT_URIS }}

      - name: Sync Worker secrets
        shell: bash
        run: |
          for name in MCP_OAUTH_CLIENT_ID MCP_OAUTH_CLIENT_SECRET MCP_ACCESS_TOKEN_SECRET MCP_OAUTH_REDIRECT_URIS; do
            printf "%s" "${!name}" | npx wrangler secret put "$name"
          done

          if [ -n "$MCP_BEARER_TOKEN" ]; then
            printf "%s" "$MCP_BEARER_TOKEN" | npx wrangler secret put MCP_BEARER_TOKEN
          else
            echo "::notice::Optional GitHub secret MCP_BEARER_TOKEN is not configured; skipping Codex bearer token sync."
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MCP_OAUTH_CLIENT_ID: ${{ secrets.MCP_OAUTH_CLIENT_ID }}
          MCP_OAUTH_CLIENT_SECRET: ${{ secrets.MCP_OAUTH_CLIENT_SECRET }}
          MCP_ACCESS_TOKEN_SECRET: ${{ secrets.MCP_ACCESS_TOKEN_SECRET }}
          MCP_OAUTH_REDIRECT_URIS: ${{ secrets.MCP_OAUTH_REDIRECT_URIS }}
          MCP_BEARER_TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
