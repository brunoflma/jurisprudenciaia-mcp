services:
  - type: web
    name: jurisprudenciaia-mcp
    runtime: node
    plan: free
    repo: https://github.com/brunoflma/jurisprudenciaia-mcp
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
